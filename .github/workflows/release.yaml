name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate Release Notes
        id: release_notes
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${REF_NAME}"^ 2>/dev/null || echo "")

          NOTES="## What's Changed\n\n"
          if [ -n "$PREVIOUS_TAG" ]; then
            NOTES="${NOTES}$(git log "${PREVIOUS_TAG}..${REF_NAME}" --pretty=format:'* %s (%h)' --reverse)\n\n"
            NOTES="${NOTES}**Full Changelog**: https://github.com/${REPO}/compare/${PREVIOUS_TAG}...${REF_NAME}"
          else
            NOTES="${NOTES}$(git log "${REF_NAME}" --pretty=format:'* %s (%h)' --reverse | tail -20)\n\n"
            NOTES="${NOTES}🎉 Initial release"
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_NOTES: ${{ steps.release_notes.outputs.notes }}
        run: |
          gh release create "${REF_NAME}" \
            --title "${REF_NAME}" \
            --notes "${RELEASE_NOTES}"

      - name: Update major version tag
        env:
          REF_NAME: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAJOR=$(echo "${REF_NAME}" | grep -oE '^v[0-9]+')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -d "${MAJOR}" 2>/dev/null || true
          git push origin ":refs/tags/${MAJOR}" 2>/dev/null || true

          git tag -a "${MAJOR}" -m "Latest ${MAJOR}.x release (${REF_NAME})"
          git push origin "${MAJOR}"
