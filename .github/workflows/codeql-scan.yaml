name: CodeQL Scan

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
        description: "Programming language to analyze (eg: java or javascript)"

jobs:
  codeql-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: ${{ inputs.language }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # ratchet:github/codeql-action/init@v4.36.2
        with:
          tools: linked
          languages: ${{ matrix.language }}
          build-mode: ${{ contains(fromJSON('["kotlin","java-kotlin","java"]'), inputs.language) && 'autobuild' || 'none' }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # ratchet:github/codeql-action/analyze@v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
