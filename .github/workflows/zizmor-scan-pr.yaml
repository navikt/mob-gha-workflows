name: zizmor Scan PR

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor-scan-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # ratchet:astral-sh/setup-uv@v8.2.0

      - name: Run zizmor security analysis
        run: |
          echo "Running zizmor security analysis..."

          # Run zizmor and capture exit code
          if uvx zizmor .; then
            echo "✅ Zizmor analysis completed successfully - no security issues found!"
          else
            exit_code=$?
            echo "❌ Zizmor analysis failed with exit code: $exit_code"
            case $exit_code in
              11) echo "🔵 Informational level security findings detected" ;;
              12) echo "🟡 Low level security findings detected" ;;
              13) echo "🟠 Medium level security findings detected" ;;
              14) echo "🔴 High level security findings detected" ;;
              *) echo "⚠️  Unknown error occurred during analysis" ;;
            esac
            echo "Please review the output above and fix the security issues before merging this PR."
            exit $exit_code
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
