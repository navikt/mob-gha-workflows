name: zizmor Scan PR

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor-scan-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # ratchet:step-security/harden-runner@v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # ratchet:astral-sh/setup-uv@v8.1.0

      - name: Run zizmor security analysis
        run: |
          echo "Running zizmor security analysis..."

          # Run zizmor and capture exit code
          if uvx zizmor .; then
            echo "✅ Zizmor analysis completed successfully - no security issues found!"
          else
            exit_code=$?
            echo "❌ Zizmor analysis failed with exit code: $exit_code"
            case $exit_code in
              11) echo "🔵 Informational level security findings detected" ;;
              12) echo "🟡 Low level security findings detected" ;;
              13) echo "🟠 Medium level security findings detected" ;;
              14) echo "🔴 High level security findings detected" ;;
              *) echo "⚠️  Unknown error occurred during analysis" ;;
            esac
            echo "Please review the output above and fix the security issues before merging this PR."
            exit $exit_code
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
