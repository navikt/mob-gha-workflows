name: Dependabot auto-merge

on:
  workflow_call:
    inputs:
      minimum-age-of-pr:
        description: "Minimum age of PR in days before automerging"
        required: false
        type: string
        default: "2"
      ignored-dependencies:
        description: "Comma-separated list of dependencies to ignore"
        required: false
        type: string
        default: ""
      semver-filter:
        description: "Semver filter for automerge (e.g., patch, minor, major)"
        required: false
        type: string
        default: "patch,minor"
      always-allow:
        description: "Comma-separated list of dependencies to always allow"
        required: false
        type: string
        default: ""
      auto-approve:
        description: "Whether to automatically approve PRs before merging them"
        required: false
        type: boolean
        default: true
      merge-method:
        description: "The merge method to use when merging pull requests (merge, squash, rebase)"
        required: false
        type: string
        default: "merge"
    secrets:
      APP_ID:
        description: "GitHub App ID"
        required: true
      PRIVATE_KEY:
        description: "GitHub App Private Key"
        required: true
  workflow_dispatch:

jobs:
  dependabot-automerge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      merged-pr-count: ${{ steps.automerge.outputs.merged-pr-count }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # ratchet:step-security/harden-runner@v2.18.0
        with:
          egress-policy: audit

      - name: Create GitHub App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # ratchet:actions/create-github-app-token@v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }} # zizmor: ignore[secrets-outside-env] reusable workflow consumes caller-provided org/environment secret
          private-key: ${{ secrets.PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env] reusable workflow consumes caller-provided org/environment secret

      - name: Automerge Dependabot PRs
        id: automerge
        uses: navikt/automerge-dependabot@70455df4433fac78f20d5a248f9ebf07ccac11fe # ratchet:navikt/automerge-dependabot@v1.5
        with:
          token: ${{ steps.app-token.outputs.token }}
          minimum-age-of-pr: ${{ inputs.minimum-age-of-pr }}
          blackout-periods: "Sat,Sun,May 1,May 17,Dec 24-Jan 3"
          ignored-dependencies: ${{ inputs.ignored-dependencies }}
          semver-filter: ${{ inputs.semver-filter }}
          always-allow: ${{ inputs.always-allow }}
          auto-approve: ${{ inputs.auto-approve }}
          merge-method: ${{ inputs.merge-method }}

      - name: Automerge results
        run: |
          echo "Automerge Results:"
          echo "Number of merged PRs: $MERGED_PR_COUNT"
          if [ "$MERGED_PR_COUNT" != "0" ]; then
            echo "$MERGED_PR_COUNT PR(s) merged. Deployment workflows will be triggered automatically by the merge event."
          else
            echo "No PRs were merged."
          fi
        env:
          MERGED_PR_COUNT: ${{ steps.automerge.outputs.merged-pr-count }}
