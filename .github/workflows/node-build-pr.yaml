name: Build & test PR

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        description: Node version to build with
        default: "24"
      server-directory:
        required: false
        type: string
        description: Server directory path
        default: "server"
      server-build-command:
        required: false
        type: string
        description: Command to build the server
        default: "pnpm run build"
      app-build-command:
        required: false
        type: string
        description: Command to build the app
        default: "pnpm run build"
      has-vitest:
        required: false
        type: boolean
        description: Whether the project has Vitest configured
        default: false
      vitest-command:
        required: false
        type: string
        description: Command to run Vitest tests
        default: "pnpm run vitest"
      has-playwright:
        required: false
        type: boolean
        description: Whether the project has Playwright configured
        default: false
      playwright-command:
        required: false
        type: string
        description: Command to run Playwright tests
        default: "pnpm run playwright"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # ratchet:step-security/harden-runner@v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # ratchet:pnpm/action-setup@v6.0.7
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: "pnpm"

      - name: Set up pnpm authentication and config
        run: |
          pnpm config set //npm.pkg.github.com/:_authToken $NODE_AUTH_TOKEN
          pnpm config set engineStrict true
          pnpm config set ignoreScripts true
          pnpm config set minimumReleaseAge 10080
          pnpm config set @navikt:registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }} # zizmor: ignore[secrets-outside-env] reusable workflow consumes caller-provided org/environment secret

      - name: Install dependencies for client
        run: pnpm install --frozen-lockfile

      - name: Install dependencies for server
        if: ${{ hashFiles(format('{0}/package.json', inputs.server-directory)) != '' }}
        working-directory: ${{ inputs.server-directory }}
        run: pnpm install --frozen-lockfile

      - name: Verify package signatures (client)
        run: pnpm audit signatures
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }} # zizmor: ignore[secrets-outside-env] reusable workflow consumes caller-provided org/environment secret

      - name: Verify package signatures (server)
        if: ${{ hashFiles(format('{0}/package.json', inputs.server-directory)) != '' }}
        working-directory: ${{ inputs.server-directory }}
        run: pnpm audit signatures
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }} # zizmor: ignore[secrets-outside-env] reusable workflow consumes caller-provided org/environment secret

      - name: Cache Playwright browsers
        if: ${{ inputs.has-playwright }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5.0.5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers (if cache miss)
        if: ${{ inputs.has-playwright && steps.playwright-cache.outputs.cache-hit != 'true' }}
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright
        if: ${{ inputs.has-playwright }}
        run: $PLAYWRIGHT_COMMAND
        env:
          PLAYWRIGHT_COMMAND: ${{ inputs.playwright-command }}

      - name: Run Vitest
        if: ${{ inputs.has-vitest }}
        run: $VITEST_COMMAND
        env:
          VITEST_COMMAND: ${{ inputs.vitest-command }}

      - name: Build server
        if: ${{ hashFiles(format('{0}/package.json', inputs.server-directory)) != '' }}
        working-directory: ${{ inputs.server-directory }}
        run: $SERVER_BUILD_COMMAND
        env:
          SERVER_BUILD_COMMAND: ${{ inputs.server-build-command }}

      - name: Build app
        run: $APP_BUILD_COMMAND
        env:
          APP_BUILD_COMMAND: ${{ inputs.app-build-command }}
