name: Actions Dependencies Scan

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  actions-dependencies-submit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # ratchet:step-security/harden-runner@v2.18.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Submit Actions dependencies
        uses: jessehouwing/actions-dependency-submission@cc1053477c0067761c9747ac9ad325b70159ab09 # ratchet:jessehouwing/actions-dependency-submission@v1.0.13
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  action-dependencies-review:
    if: github.event_name == 'pull_request'
    needs: actions-dependencies-submit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # ratchet:step-security/harden-runner@v2.18.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # ratchet:actions/dependency-review-action@v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          warn-only: false
