name: Build and push image

on:
  workflow_call:
    inputs:
      docker-context:
        required: false
        type: string
        description: Path to the Docker build context
        default: "."
      dockerfile:
        required: false
        type: string
        description: Path to the Dockerfile
        default: "Dockerfile"
      image-tag:
        required: false
        type: string
        description: Docker image tag
        default: "latest"
      image-suffix:
        required: false
        type: string
        description: Suffix to append to the image tag
        default: ""
      use-artifact:
        required: false
        type: boolean
        default: true
        description: Use pre-built artifact from build step (requires gradle-build-and-test to run first)
    outputs:
      image:
        description: Google Artifact Registry image
        value: ${{ jobs.build-push-image.outputs.image }}

jobs:
  build-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download build artifact
        if: ${{ inputs.use-artifact == true }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: gradle-build-${{ github.run_id }}
          path: build/

      - name: Push Docker Image to GAR
        uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # v0
        id: docker-build-push
        with:
          team: okonomi
          dockerfile: ${{ inputs.dockerfile }}
          docker_context: ${{ inputs.docker-context }}
          image_suffix: ${{ inputs.image-suffix }}
          tag: ${{ inputs.image-tag }}

    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
