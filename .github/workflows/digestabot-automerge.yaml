name: Digestabot auto-merge

on:
  workflow_call:
    secrets:
      APP_ID:
        description: "GitHub App ID"
        required: true
      PRIVATE_KEY:
        description: "GitHub App Private Key"
        required: true
  workflow_dispatch:

jobs:
  digestabot-automerge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # ratchet:step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Create GitHub App Token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # ratchet:actions/create-github-app-token@v2.2.1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Automerge digestabot PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: "prs=$(gh pr list --label digestabot --json number,mergeable,statusCheckRollup,author)\n\nif [ -z \"$prs\" ] || [ \"$prs\" = \"[]\" ]; then\n  echo \"No digestabot PRs found\"\n  exit 0\nfi\n\nmerged_count=0\nwhile read -r pr_number; do\n  echo \"Approving and merging PR #$pr_number\"\n  if gh pr review \"$pr_number\" --approve; then\n    if gh pr merge \"$pr_number\" --merge --auto; then\n      merged_count=$((merged_count + 1))\n    fi\n  fi\ndone < <(echo \"$prs\" | jq -r '.[] | \n  select(.author.login == \"app/github-actions\") |\n  select(.mergeable == \"MERGEABLE\") | \n  select(.statusCheckRollup // [] | all(.conclusion == \"SUCCESS\" or .conclusion == \"SKIPPED\")) |\n  .number')\n\necho \"Merged $merged_count digestabot PR(s)\""
