name: Digestabot auto-merge

on:
  workflow_call:
    secrets:
      APP_ID:
        description: "GitHub App ID"
        required: true
      PRIVATE_KEY:
        description: "GitHub App Private Key"
        required: true
  workflow_dispatch:

jobs:
  digestabot-automerge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # ratchet:step-security/harden-runner@v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Create GitHub App Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # ratchet:actions/create-github-app-token@v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }} # zizmor: ignore[secrets-outside-env] reusable workflow consumes caller-provided org/environment secret
          private-key: ${{ secrets.PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env] reusable workflow consumes caller-provided org/environment secret

      - name: Automerge digestabot PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: "prs=$(gh pr list --label digestabot --json number,mergeable,statusCheckRollup,author)\n\nif [ -z \"$prs\" ] || [ \"$prs\" = \"[]\" ]; then\n  echo \"No digestabot PRs found\"\n  exit 0\nfi\n\nmerged_count=0\nwhile read -r pr_number; do\n  echo \"Approving and merging PR #$pr_number\"\n  if gh pr review \"$pr_number\" --approve; then\n    if gh pr merge \"$pr_number\" --merge --auto; then\n      merged_count=$((merged_count + 1))\n    fi\n  fi\ndone < <(echo \"$prs\" | jq -r '.[] | \n  select(.author.login == \"app/github-actions\") |\n  select(.mergeable == \"MERGEABLE\") | \n  select(.statusCheckRollup // [] | all(.conclusion == \"SUCCESS\" or .conclusion == \"SKIPPED\")) |\n  .number')\n\necho \"Merged $merged_count digestabot PR(s)\""
